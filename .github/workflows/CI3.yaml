name: Module CI & Documentation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
on:
  workflow_call:
    inputs:
      module_level:
        description: Possible values are [1|2|3|4]. Indicates the module level for which this workflow should run.
        required: true
        type: number
      terraform_working_directory:
        description: The working directory terraform uses in a monorepo with multiple workspaces
        default: '.'
        type: string
        
env:
  TFLINT_VERSION: v0.39.3
  TFSEC_VERSION: latest
  TFC_VERSION: 1.12.2
      
jobs:
  tflint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 
      uses: actions/checkout@v3
      
    - name: TFLint - Setup
      uses: terraform-linters/setup-tflint@v2
      with:
        tflint_version: ${{ env.TFLINT_VERSION }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
          
    - name: TFLint - Version
      working-directory: ${{ inputs.terraform_working_directory }}
      run: tflint --version

    - name: TFLint - Initialize
      working-directory: ${{ inputs.terraform_working_directory }}
      run: tflint --init

    - name: TFLint - Run
      working-directory: ${{ inputs.terraform_working_directory }}
      run: tflint --format=compact > tflint_output.txt || true
      continue-on-error: true

    - name: TFLint Summary
      working-directory: ${{ inputs.terraform_working_directory }}
      run: |
        echo "### TFLint Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat tflint_output.txt >> $GITHUB_STEP_SUMMARY
  
  tfsec:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: TFSec
      uses: aquasecurity/tfsec-action@v1.0.0
      with:
        soft_fail: true
        working_directory: ${{ inputs.terraform_working_directory }}
        version: ${{ env.TFSEC_VERSION }}
        
  checkov:
    name: Policy Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        quiet: false
        soft_fail: false
        directory: ${{ inputs.terraform_working_directory }}
        skip_check: CKV_TF_1
        framework: terraform
        output_format: sarif
        download_external_modules: false
        log_level: WARNING
        
  terraform:
    needs: [tflint, tfsec, checkov]
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Replace Temporary Provider Tokens
      uses: cschleiden/replace-tokens@v1
      with:
        files: '["providers.tf"]'
      env:
        TEMPORARY_PROVIDER_START: "*/"
        TEMPORARY_PROVIDER_END: "/*"

    - name: Cache Terraform providers
      uses: actions/cache@v4
      with:
        path: ${{ inputs.terraform_working_directory }}/.terraform.d/plugin-cache
        key: ${{ runner.os }}-terraform-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.terraform_working_directory)) }}
        restore-keys: |
          ${{ runner.os }}-terraform-
          
    - name: Terraform - Setup
      uses: hashicorp/setup-terraform@v2
      with: 
        terraform_version: ${{ env.TFC_VERSION }}
        cli_config_credentials_token: ${{ secrets.TFC_TOKEN }}
        
    - name: Terraform - Init
      working-directory: ${{ inputs.terraform_working_directory }}
      run: terraform init -plugin-dir=${{ inputs.terraform_working_directory }}/.terraform.d/plugin-cache

    - name: Terraform - Validate
      working-directory: ${{ inputs.terraform_working_directory }}
      run: terraform validate -no-color
      
    - name: Terraform - Speculative Plan
      if: ${{ inputs.module_level == 4 }}
      id: speculativeplan
      working-directory: ${{ inputs.terraform_working_directory }}
      run: |
        terraform plan | tee terraform_plan_output.txt
        echo "exit_code=$PIPESTATUS" >> "$GITHUB_OUTPUT"

    - name: Terraform - Plan Result
      if: ${{ inputs.module_level == 4 && steps.speculativeplan.outputs.exit_code != '0' }}
      run: |
        echo "Terraform plan failed. Expand Speculative Plan step for error details"
        exit 1
        
    - name: Terraform - Job Summary
      if: ${{ inputs.module_level == 4 }}
      uses: sgametrio/terraform-summary-action@main
      with:
        log-file: ${{ inputs.terraform_working_directory }}/terraform_plan_output.txt
        title: Terraform Plan Summary

  documentation:
    if: ${{ inputs.module_level != 4 }}
    name: Documentation
    needs: [tflint, tfsec, checkov]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Render Documentation
      uses: terraform-docs/gh-actions@main
      with:
        output-method: replace
        git-push: "true"
        working-dir: ${{ inputs.terraform_working_directory }}
